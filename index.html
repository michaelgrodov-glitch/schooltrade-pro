<!DOCTYPE HTML>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>schooltrade3</title>
    <link rel="icon" type="image/png" href="https://github.com/michaelgrodov-glitch/schooltrade-pro/blob/main/logo-modified.png?raw=true">
      <style>
        body{
          background:linear-gradient(135deg, #0b0f19 0%, #111827 100%);
          font-family: 'Inter', sans-serif;
          display:flex;
          justify-content: center;
          align-items:center;
          height:100vh;
          margin:0;
          color:#ffffff;
        }
    #gate{
      background:#0f131c;
      padding:40px 32px;
      width:100%;
      max-width:440px;
      border-radius:16px;
      box-shadow:0 20px 25px -5px rgba(0,0,0,0.3),0 10px 10px -5px rgba(0, 0, 0, 0.2);
      text-align:center;
      box-sizing:border-box;
      border: 1px solid #1e293b;
    }
    #gate img{
      width:100px;
      border:2px solid white;
      border-radius:50%;
      box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
    }
        h1{
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-family:'Playfair Display', serif;
          font-style:italic;
        }
        #password{
          background:white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-size:30px;
          border:none;
          text-align: center;  
            padding: 10px 0;
            box-sizing: border-box;
            outline: none;  
        }
        button{
          background:darkblue;
          color:white;
          font-size:30px;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          border:2px solid white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          margin-top:15px;
          padding:0px 30px;
          transition: transform 0.3s ease;
          display: inline-block;
        }
        ::placeholder{
          color:#0f131c;
          -webkit-text-stroke:1px white;
          letter-spacing: 3px;
          display: block;
          width: 100%;
          font-size: 25px; 
        }
        button:active{
          transform:scale(0.9);
        }
        #i{
          position: absolute;   
          top: 20px;     
          left: 20px;
          width: 900px;
          height: 40px; 
          display: flex;
          align-items: center;
          justify-content: flex-start;
          background:#0f131c;
          border-radius:16px;
          border: 1px solid #1e293b;
          gap:10px;
          box-shadow:0 20px 25px -5px rgba(0,0,0,0.3),0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
        #time {
         text-shadow: none; 
         color: #94a3b8; 
         font-weight: 400; 
         font-size: 14px;  
         margin-left: auto;
         padding-right: 15px;
}
        #i img {
        height: 100%;
        width: auto;
        border: none;
        border-radius: 50%;
        box-shadow: none;
        box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
        }
        p{
          height: 100%;
          width: auto;
          text-shadow: none;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          align-items: center;
          margin:0;
          line-height: 1;
          margin-top:25px;
        }
  </style>
    <script>
      function time(){
        const now = new Date();
        document.getElementById("time").innerHTML = now.toLocaleTimeString();
      }
      setInterval(time,1000);
      time();
      function reg(){
        let login=document.getElementById("password").value;
        const password=367927369;
        if(login === password){
          window.location.href = "schoolAuth.html";
            }
      }
    </script>
  </head>
  <body>
    <div id="i">
       <img src="https://raw.githubusercontent.com/michaelgrodov-glitch/schooltrade-pro/main/logo.JPG" alt="logo"/><p>•Schooltrade-pro</p><p id="time"></p>
    </div>
    <div id="gate">
      <img src="https://raw.githubusercontent.com/michaelgrodov-glitch/schooltrade-pro/main/logo.JPG" alt="logo"/>
      <h1>קבל את קוד מבית הספר</h1>
      <input type="password" placeholder="welcome to schooltrade" id="password" autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"/><button onclick="reg()" id="b">click</button>
    </div>
  </body>
</html>
