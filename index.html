<!DOCTYPE HTML>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>schooltrade3</title>
    <link rel="icon" type="image/png" href="https://github.com/michaelgrodov-glitch/schooltrade-pro/blob/main/logo-modified.png?raw=true">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body{
          background-image:url("https://cdn.leonardo.ai/users/2ac21151-35b0-4045-9ca0-3d5f31eeb684/generations/1f17c94a-0d1e-63f0-a598-a8efc883859b/lucid-origin_Abstract_dark_tech_background_deep_navy_blue_and_dark_charcoal_geometric_canvas_-0.jpg");
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          background-attachment: fixed;
          image-rendering: -webkit-optimize-contrast; /* Safari */
          image-rendering: crisp-edges;  
          font-family: 'Inter', sans-serif;
          display:flex;
          justify-content: center;
          align-items:center;
          min-height: 100vh;
          margin:0;
          color:#ffffff;
        }
    #gate{
      background:#0f131c;
      padding:40px 32px;
      width:100%;
      max-width:440px;
      border-radius:16px;
      box-shadow:0 20px 25px -5px rgba(0,0,0,0.3),0 10px 10px -5px rgba(0, 0, 0, 0.2);
      text-align:center;
      box-sizing:border-box;
      border: 1px solid #1e293b;
      z-index:1;
      margin: auto !important; 
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
    }
    #gate img{
      width:100px;
      border:2px solid white;
      border-radius:50%;
      box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
    }
        h1{ 
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-family:'Playfair Display', serif;
          font-style:italic;
        }
        #password{
          background:white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-size:30px;
          border:none;
          text-align: center;  
            padding: 10px 0;
            box-sizing: border-box;
            outline: none;  
        }
        button{
          background: #334155;
          color: #94a3b8;
          font-size:30px;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          border:2px solid white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          margin-top:15px;
          padding:0px 30px;
          transition: all 0.3s ease;
          transition: transform 2s ease;
          display: inline-block;
          width:300px;
          text-shadow:none;
          box-shadow:none;
          cursor: not-allowed;
          pointer-events: none;
          opacity: 0.7;
        }
      button.active {
          background: darkblue;
          color: white;
          text-shadow: 0 0 10px white, 0 0 20px blue, 0 0 40px blue, 0 0 80px blue;
          border: 2px solid white;
          box-shadow: 0 0 10px white, 0 0 20px blue, 0 0 40px blue, 0 0 80px blue;
          cursor: pointer;
          pointer-events: auto;
        }
        ::placeholder{
          color:#0f131c;
          -webkit-text-stroke:1px white;
          letter-spacing: 3px;
          display: block;
          width: 100%;
          font-size: 25px; 
        }
        button:active{
          transform:scale(0.9);
        }
        #i{
          position: absolute;   
          top: 20px;     
          left: 20px;
          width: 1400px;
          height: 40px; 
          display: flex;
          align-items: center;
          justify-content: flex-start;
          background:#0f131c;
          border-radius:16px;
          border: 1px solid #1e293b;
          gap:10px;
          box-shadow:0 20px 25px -5px rgba(0,0,0,0.3),0 10px 10px -5px rgba(0, 0, 0, 0.2);
          line-height: 40px;
          z-index:1;
        }
        #i img {
        height: 100%;
        width: auto;
        border: none;
        border-radius: 50%;
        box-shadow: none;
        box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
        }
        #time{
          width: auto;
          text-shadow: none;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          align-items: center;
          margin-left:auto;
          line-height: 1;
          font-size:18px;
          margin-left:auto;
          margin-right:5px;
        }
        .swal2-container{
          z-index:99999 !important;
}
      #country{
          width: auto;
          text-shadow: none;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          align-items: center;
          line-height: 1;
          margin-left:10px;
          color:#94a3b8;
          font-size:18px;
      }
  </style>
    <script>
     window.onload = function () {
       setInterval(time,1000);
       time();
      fetch("https://ipwho.is/")
      .then(response => response.json())
      .then(data => {
      document.getElementById("country").textContent =
         "country: " + data.flag.emoji + " " + data.country;

      if (data.country_code != "IL") {
        window.location.href = "onlyIsraelUsers.html";
      }
    })
    .catch(error => {
      console.log("Ошибка получения страны:", error);
    });
       const p = document.getElementById("password");
      const ab = document.getElementById("b");
      p.addEventListener("input",function(){
        if (p.value.length === 9){
          ab.classList.add("active");
        }else{
          ab.classList.remove("active");
        }
      });
};
      function time(){
        const now = new Date();
        document.getElementById("time").innerHTML = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
      }
      function reg(){
        let login=document.getElementById("password").value;
        if(login === "367927369"){
          window.location.href = "schoolAuth.html";
            }else{
              Swal.fire({
              title: 'הקוד שלכם שגוי',
              text: 'הקוד שגוי תנסו שוב או שתבקשו קוד מבית הספר',
              icon: 'error',
              showCancelButton: false,
              confirmButtonColor: '#3085d6',
              confirmButtonText: 'לנסות שוב',
        });
      }
      }
    </script>
  </head>
  <body>
    <div id="i">
       <img src="https://raw.githubusercontent.com/michaelgrodov-glitch/schooltrade-pro/main/logo.JPG" alt="logo"/><p>•Schooltrade-pro</p><p id="country"></p><p id="time"></p>
    </div>
    <div id="gate">
      <img src="https://raw.githubusercontent.com/michaelgrodov-glitch/schooltrade-pro/main/logo.JPG" alt="logo"/>
      <h1>קבל את קוד מבית הספר</h1>
      <input type="password" placeholder=":הזן את הקוד בית ספר שלך" id="password" autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"/>
      <button onclick="reg()" id="b">להזן את הקוד</button>
    </div>
  </body>
</html>
