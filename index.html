<!DOCTYPE HTML>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>schooltrade3</title>
    <link rel="icon" type="image/png" href="https://github.com/michaelgrodov-glitch/schooltrade-pro/blob/main/logo-modified.png?raw=true">
      <style>
        body{
          background:linear-gradient(135deg, #0b0f19 0%, #111827 100%);
          font-family: 'Inter', sans-serif;
          display:flex;
          justify-content: center;
          align-items:center;
          height:100vh;
          margin:0;
          color:#ffffff;
        }
    #gate{
      background:#0f131c;
      padding:40px 32px;
      width:100%;
      max-width:440px;
      border-radius:16px;
      box-shadow:0 20px 25px -5px rgba(0,0,0,0.3),0 10px 10px -5px rgba(0, 0, 0, 0.2);
      text-align:center;
      box-sizing:border-box;
      border: 1px solid #1e293b;
    }
    img{
      width:100px;
      border:2px solid white;
      border-radius:50%;
      box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
    }
        p{
        }
        h1{
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-family:'Playfair Display', serif;
          font-style:italic;
        }
        #password{
          background:white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          font-size:100px;
        }
        button{
          background:darkblue;
          color:white;
          font-size:100px;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
          border:2px white;
          border-radius:16px;
          box-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
        }
        ::placeholder{
          color:#0f131c;
          text-shadow:0 0 10px white,0 0 20px blue,0 0 40px blue,0 0 80px blue;
        }
  </style>
  </head>
  <body>
    <div id="gate">
      <img src="https://raw.githubusercontent.com/michaelgrodov-glitch/schooltrade-pro/main/logo.JPG" alt="logo"/>
      <h1>קבל את קוד מבית הספר</h1>
      <input type="password" placeholder="wellcome to schooltrade" id="password" autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"/><button onclick="reg()">click</button>
    </div>
  </body>
</html>
